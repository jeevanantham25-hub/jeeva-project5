<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding:20px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.caption{
    padding:12px;
    text-align:center;
    font-weight:bold;
    color:#555;
}

</style>

</head>
<body>

<h1>Photo Gallery</h1>
